components:
  schemas:
    Address:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        address_line_1:
          type: string
          maxLength: 255
        address_line_2:
          type: string
          maxLength: 255
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        postal_code:
          type: string
          maxLength: 20
        country:
          type: string
          maxLength: 100
        is_default:
          type: boolean
      required:
      - address_line_1
      - city
      - country
      - id
      - postal_code
      - state
    Cart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        total_items:
          type: integer
          readOnly: true
        cart_total:
          type: number
          format: double
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cart_total
      - created_at
      - id
      - items
      - total_items
      - updated_at
      - user
    CartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_variant:
          type: integer
        product_name:
          type: string
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        unit_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        line_total:
          type: number
          format: double
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - line_total
      - product_name
      - product_variant
      - unit_price
      - updated_at
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        parent:
          type: integer
          nullable: true
        children:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - children
      - created_at
      - id
      - name
      - slug
      - updated_at
    Commission:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        vendor:
          type: integer
        vendor_name:
          type: string
          readOnly: true
        order_item:
          type: integer
        gross_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        commission_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        commission_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        net_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/CommissionStatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - commission_amount
      - commission_rate
      - created_at
      - gross_amount
      - id
      - net_amount
      - order_item
      - updated_at
      - vendor
      - vendor_name
    CommissionStatusEnum:
      enum:
      - pending
      - cleared
      - paid
      type: string
      description: |-
        * `pending` - Pending
        * `cleared` - Cleared
        * `paid` - Paid
    CustomerProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        phone_number:
          type: string
          maxLength: 20
      required:
      - id
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        user_email:
          type: string
          format: email
          readOnly: true
        shipping_address:
          type: integer
          nullable: true
        status:
          $ref: '#/components/schemas/OrderStatusEnum'
        payment_status:
