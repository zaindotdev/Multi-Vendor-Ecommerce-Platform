      - payout_threshold
    VendorRegistration:
      type: object
      properties:
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          writeOnly: true
        password_confirm:
          type: string
          writeOnly: true
        company_name:
          type: string
        company_description:
          type: string
        company_slug:
          type: string
          pattern: ^[-a-zA-Z0-9_]+$
        logo_url:
          type: string
          format: uri
        banner_url:
          type: string
          format: uri
        contact_number:
          type: string
      required:
      - company_name
      - company_slug
      - email
      - password
      - password_confirm
      - username
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
